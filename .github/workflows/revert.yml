name: Revert to pre-today state
on: workflow_dispatch
jobs:
  revert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Revert to initial commit state
        run: |
          git checkout f5e12a0d03471b7fa00a566520a8fd87229a39fe -- .
          git rm -f app/api/geo/route.js app/api/payments-status/route.js "app/blog/[slug]/page.jsx" app/example/page.jsx app/faq/page.jsx components/AudioPlayer.jsx components/CookieSettingsButton.jsx components/NewsletterBanner.jsx components/NewsletterSignup.jsx components/PricingProvider.jsx components/PurchaseModal.jsx components/VideoPlayer.jsx lib/music-collections.js lib/posts-all.js lib/pricing.js lib/songs.js package-lock.json setup-stripe-live.js
          sed -i '/^export const config/d' app/api/stripe-webhook/route.js
          sed -i '/^.*Stripe requires the raw body/d' app/api/stripe-webhook/route.js
          sed -i "s/setAll(cookiesToSet)/setAll(cookiesToSet: { name: string; value: string; options?: any }[])/" utils/supabase/middleware.ts
          sed -i "s/setAll(cookiesToSet)/setAll(cookiesToSet: { name: string; value: string; options?: any }[])/" utils/supabase/server.ts
          rm -f .github/workflows/revert.yml
      - name: Commit and push
        run: |
          git config user.name "BrickBoxNAFO"
          git config user.email "Jonathanmichaellees@outlook.com"
          git add -A
          git commit -m "Revert all changes to restore site to pre-today state"
          git push
